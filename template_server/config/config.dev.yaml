server:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    - X-Request-ID

mysql:
  host: 1Panel-mysql-RHnT
  port: 3306
  user: service_runner
  password: "{{ secret `mysql.password` }}"
  database: auth_service_test
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  addr: 1Panel-redis-PDvy:6379
  password: "{{ secret `redis.password` }}"
  db: 2
  pool_size: 10

log:
  level: debug
  file: logs/app.log

jwt:
  secret: "{{ secret `jwt.secret` }}"
  issuer: auth_service
  access_expiry: 7200
  refresh_expiry: 7776000

auth:
  state_ttl_second: 300
  phone_captcha_ttl_second: 300
  guest_device_ttl_second: 600
  tenants:
    - key: stellar
      name: Stellar
      enabled: true
      bridge_base_url: https://stellar.xdarren.com
      bridge_auth_key: "{{ secret `auth.tenants.stellar.bridge_auth_key` }}"
      providers:
        - provider: wechat_app
          client_type: app
          enabled: true
          app_id: wxd5551e8aab2c8f3e
          app_secret: "{{ secret `auth.tenants.stellar.providers.wechat.app_secret` }}"
        - provider: apple
          client_type: ios
          enabled: true
          client_id: com.xdarren.stellar
          team_id: X4L9Z2674W
          key_id: 3R537T99VJ
          signing_key: "{{ secret `auth.tenants.stellar.providers.apple.signing_key` }}"
        - provider: password
          client_type: app
          enabled: true
        - provider: phone
          client_type: app
          enabled: true
          test_phone: "18912345678"
          test_captcha: "1234"
          test_captcha_key: test-captcha-key
          extra_json: "{{ secret `auth.tenants.stellar.providers.phone.extra_json` }}"
        - provider: guest
          client_type: app
          enabled: true
    - key: tinytext
      name: TinyText
      enabled: true
      bridge_base_url: https://tinytext.xdarren.com
      bridge_auth_key: "{{ secret `auth.tenants.tinytext.bridge_auth_key` }}"
      providers:
        - provider: wechat_web
          client_type: web
          enabled: true
          app_id: wxbb79bd2eb7ece73a
          app_secret: "{{ secret `auth.tenants.tinytext.providers.wechat.app_secret` }}"
          redirect_uri: https://tinytext.xdarren.com/wechat/callback
          scope: snsapi_login
        - provider: firebase_auth
          client_type: web
          enabled: true
          client_id: "{{ secret `auth.tenants.tinytext.providers.firebase.project_id` }}"
    - key: elook
      name: Elook
      enabled: true
      default_avatar_url: https://files.xdarren.com/elook/images/defaults/avatar.jpg
      legacy_default_avatar_urls:
        - https://files.xdarren.com/elook/images/defaults/avatar.png
        - http://files.xdarren.com/images/bear.jpeg
      bridge_base_url: http://elook_server_test:8080
      bridge_auth_key: "{{ secret `auth.tenants.elook.bridge_auth_key` }}"
      providers:
        - provider: wechat_miniprogram
          client_type: miniprogram
          enabled: true
          app_id: wx4b158c199ebc23c8
          app_secret: "{{ secret `auth.tenants.elook.providers.wechat.app_secret` }}"
        - provider: wechat_web
          client_type: web
          enabled: true
          app_id: wxdb50a7def9bf241e
          app_secret: "{{ secret `auth.tenants.elook.providers.wechat_web.app_secret` }}"
          redirect_uri: https://console.elookedu.cn/wechat/callback
          scope: snsapi_login
        - provider: password
          client_type: default
          enabled: true
        - provider: phone
          client_type: miniprogram
          enabled: true
          test_phone: "18912345678"
          test_captcha: "1234"
          test_captcha_key: test-captcha-key
          sms:
            secret_id: "AKID1wjLk7MYcWEiy2yhD1d2DAvSlqpkVM7r"
            secret_key: "Qo073mIbkgZGk170qVyUvAC5nYFqJcjf"
            app_key: "54150427e31d1628c60440a3625f7740"
            sms_sdk_app_id: "1401133423"
            sign_name: 两江新区益课学生校外托管
            region: ap-guangzhou
            templates:
              login:
                template_id: "2650973"
                params:
                  - captcha
                  - expire_minutes
              bind:
                template_id: "2650974"
                params:
                  - captcha
              rebind:
                template_id: "2650974"
                params:
                  - captcha
    - key: template_project
      name: Template Project
      enabled: true
      bridge_base_url: http://template_server_test:8080
      bridge_auth_key: "{{ secret `auth.tenants.template_project.bridge_auth_key` }}"
      providers:
        - provider: password
          client_type: default
          enabled: true
    - key: imagen
      name: Imagen
      enabled: true
      bridge_base_url: http://imagen_server_test:8080
      bridge_auth_key: "{{ secret `auth.tenants.imagen.bridge_auth_key` }}"
      providers:
        - provider: password
          client_type: default
          enabled: true
    - key: notification
      name: Notification
      enabled: true
      bridge_base_url: http://notification_server_test:8080
      bridge_auth_key: "{{ secret `auth.tenants.notification.bridge_auth_key` }}"
      providers:
        - provider: password
          client_type: default
          enabled: true
