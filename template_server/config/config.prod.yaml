server:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    - X-Request-ID

mysql:
  host: 1Panel-mysql-RHnT
  port: 3306
  user: service_runner
  password: "{{ profile `AUTH_SERVICE_SERVER_MYSQL_PASSWORD` }}"
  database: auth_service
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  addr: 1Panel-redis-PDvy:6379
  password: "{{ profile `AUTH_SERVICE_SERVER_REDIS_PASSWORD` }}"
  db: 2
  pool_size: 10

log:
  level: info
  file: logs/app.log

jwt:
  secret: "{{ profile `AUTH_SERVICE_SERVER_JWT_SECRET` }}"
  issuer: auth_service
  access_expiry: 7200
  refresh_expiry: 7776000

auth:
  state_ttl_second: 300
  phone_captcha_ttl_second: 300
  guest_device_ttl_second: 600
  tenants:
    - key: stellar
      name: Stellar
      enabled: true
      bridge_base_url: https://stellar.xdarren.com
      bridge_auth_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_STELLAR_BRIDGE_AUTH_KEY` }}"
      providers:
        - provider: wechat_app
          client_type: app
          enabled: true
          app_id: wxd5551e8aab2c8f3e
          app_secret: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_STELLAR_PROVIDERS_WECHAT_APP_SECRET` }}"
        - provider: apple
          client_type: ios
          enabled: true
          client_id: com.xdarren.stellar
          team_id: X4L9Z2674W
          key_id: 3R537T99VJ
          signing_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_STELLAR_PROVIDERS_APPLE_SIGNING_KEY` }}"
        - provider: password
          client_type: app
          enabled: true
        - provider: phone
          client_type: app
          enabled: true
          test_phone: "18912345678"
          test_captcha: "1234"
          test_captcha_key: test-captcha-key
          extra_json: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_STELLAR_PROVIDERS_PHONE_EXTRA_JSON` }}"
        - provider: guest
          client_type: app
          enabled: true
    - key: tinytext
      name: TinyText
      enabled: true
      bridge_base_url: http://tinytext_server_prod:8080
      bridge_auth_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_TINYTEXT_BRIDGE_AUTH_KEY` }}"
      providers:
        - provider: wechat_web
          client_type: web
          enabled: true
          app_id: wxbb79bd2eb7ece73a
          app_secret: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_TINYTEXT_PROVIDERS_WECHAT_APP_SECRET` }}"
          redirect_uri: https://tinytext.xdarren.com/wechat/callback
          scope: snsapi_login
        - provider: firebase_auth
          client_type: web
          enabled: true
          client_id: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_TINYTEXT_PROVIDERS_FIREBASE_PROJECT_ID` }}"
    - key: elook
      name: Elook
      enabled: true
      default_avatar_url: https://files.xdarren.com/elook/images/defaults/avatar.jpg
      legacy_default_avatar_urls:
        - https://files.xdarren.com/elook/images/defaults/avatar.png
        - http://files.xdarren.com/images/bear.jpeg
      bridge_base_url: http://elook_server_prod:8080
      bridge_auth_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_BRIDGE_AUTH_KEY` }}"
      providers:
        - provider: wechat_miniprogram
          client_type: miniprogram
          enabled: true
          app_id: wxacd92b14193e2feb
          app_secret: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_PROVIDERS_WECHAT_APP_SECRET` }}"
        - provider: wechat_web
          client_type: web
          enabled: true
          app_id: wxdb50a7def9bf241e
          app_secret: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_PROVIDERS_WECHAT_WEB_APP_SECRET` }}"
          redirect_uri: https://console.elookedu.cn/wechat/callback
          scope: snsapi_login
        - provider: password
          client_type: default
          enabled: true
        - provider: phone
          client_type: miniprogram
          enabled: true
          test_phone: "18912345678"
          test_captcha: "1234"
          test_captcha_key: test-captcha-key
          sms:
            secret_id: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_PROVIDERS_PHONE_SMS_SECRET_ID` }}"
            secret_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_PROVIDERS_PHONE_SMS_SECRET_KEY` }}"
            app_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_ELOOK_PROVIDERS_PHONE_SMS_APP_KEY` }}"
            sms_sdk_app_id: "1401133423"
            sign_name: 两江新区益课学生校外托管
            region: ap-guangzhou
            templates:
              login:
                template_id: "2650973"
                params:
                  - captcha
                  - expire_minutes
              bind:
                template_id: "2650974"
                params:
                  - captcha
              rebind:
                template_id: "2650974"
                params:
                  - captcha
    - key: imagen
      name: Imagen
      enabled: true
      bridge_base_url: http://imagen_server_prod:8080
      bridge_auth_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_IMAGEN_BRIDGE_AUTH_KEY` }}"
      providers:
        - provider: password
          client_type: default
          enabled: true
    - key: notification
      name: Notification
      enabled: true
      bridge_base_url: http://notification_server_prod:8080
      bridge_auth_key: "{{ profile `AUTH_SERVICE_SERVER_AUTH_TENANTS_NOTIFICATION_BRIDGE_AUTH_KEY` }}"
      providers:
        - provider: password
          client_type: default
          enabled: true
