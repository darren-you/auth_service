server:
  port: 8080
  read_timeout: 30
  write_timeout: 30
  allow_origins:
    - "*"
  allow_methods:
    - GET
    - POST
    - OPTIONS
  allow_headers:
    - Origin
    - Content-Type
    - Accept
    - Authorization
    - X-Request-ID

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: ""
  database: auth_service
  max_open_conns: 100
  max_idle_conns: 10
  conn_max_lifetime: 3600

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 2
  pool_size: 10

log:
  level: info
  file: logs/app.log

jwt:
  secret: replace-with-a-strong-secret
  issuer: auth_service
  access_expiry: 7200
  refresh_expiry: 7776000

auth:
  state_ttl_second: 300
  phone_captcha_ttl_second: 300
  guest_device_ttl_second: 600
  tenants:
    - key: demo
      name: Demo
      enabled: true
      providers:
        - provider: guest
          client_type: app
          enabled: true
